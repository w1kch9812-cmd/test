# cargo-deny 정책 — 라이선스 + 보안 + 공급망 자동 검증
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # RUSTSEC-2023-0071: rsa crate Marvin Attack timing sidechannel.
    # sqlx-postgres password auth 호환용 transitive dep — 우리는 RSA 직접 사용 X.
    # rsa crate fix 미발행 (2026-05 기준), sqlx 의 다음 메이저에서 sqlx-postgres 가 다른 path 로 이전 시 해소 예정.
    # https://rustsec.org/advisories/RUSTSEC-2023-0071
    "RUSTSEC-2023-0071",
]

[licenses]
# unused allow 항목 = warn만 (빈 workspace에서 fail 안 되도록)
unused-allowed-license = "allow"
# publish = false인 워크스페이스 멤버는 라이선스 검사 무시 (사내 비공개)
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    # webpki-roots (Mozilla CA bundle, sqlx → rustls 경로) — Linux Foundation 데이터 라이선스
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
