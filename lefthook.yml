# https://lefthook.dev/configuration/
# pre-commit: fast local checks for staged changes.
# pre-push: full local verification gates.

pre-commit:
  parallel: true
  commands:
    lefthook-no-fake-pass:
      run: bash scripts/lefthook/check-no-fake-pass.sh
    forbidden-implementation-markers:
      run: bash scripts/lefthook/check-forbidden-implementation-markers.sh
    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    rustfmt:
      glob: "*.rs"
      run: cargo fmt -- {staged_files}
      stage_fixed: true
      skip:
        - merge
        - rebase
    markdownlint:
      glob: "*.md"
      run: pnpm markdownlint-cli2 {staged_files}
    gitleaks:
      run: gitleaks protect --staged --redact -v
      skip:
        - merge
        - rebase
    file-line-limit:
      run: bash scripts/lefthook/file-line-limit.sh
      skip:
        - merge
        - rebase
    panel-no-framework-import-kind:
      glob: "apps/web/lib/panel/**/*.{ts,tsx}"
      run: bash scripts/lefthook/panel-no-framework-import-kind.sh
    panel-no-direct-codec:
      glob: "apps/web/**/*.{ts,tsx}"
      run: bash scripts/lefthook/panel-no-direct-codec.sh
    panel-no-state-without-router:
      glob: "apps/web/stores/**/*.{ts,tsx}"
      run: bash scripts/lefthook/panel-no-state-without-router.sh
    catalog-m1-boundary:
      run: bash scripts/lefthook/catalog-m1-boundary.sh
    pnu-anchor-pbf-marker-contract:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-pnu-anchor-pbf-marker-contract.ps1
    platform-core-boundary:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-platform-core-boundary.ps1
    lakehouse-registry-integration:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-lakehouse-registry-integration.ps1
    platform-core-event-receiver-contract:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-platform-core-event-receiver-contract.ps1
    platform-core-catalog-api-contract:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-platform-core-catalog-api-contract.ps1
    platform-core-dependency-boundary:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-platform-core-dependency-boundary.ps1
    migration-version-prefixes:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-migration-version-prefixes.ps1
    platform-core-anchor-inbox-db-approval:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-platform-core-anchor-inbox-db-approval.ps1
    verification-control-plane:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-verification-control-plane.ps1
    bazel-transition-ratchet:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-bazel-transition-ratchet.ps1

pre-push:
  parallel: false
  commands:
    lefthook-no-fake-pass:
      run: bash scripts/lefthook/check-no-fake-pass.sh
      skip:
        - merge
        - rebase
    forbidden-implementation-markers:
      run: bash scripts/lefthook/check-forbidden-implementation-markers.sh
      skip:
        - merge
        - rebase
    catalog-m1-boundary:
      run: bash scripts/lefthook/catalog-m1-boundary.sh
      skip:
        - merge
        - rebase
    platform-core-boundary:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-platform-core-boundary.ps1
      skip:
        - merge
        - rebase
    pnu-anchor-pbf-marker-contract:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-pnu-anchor-pbf-marker-contract.ps1
