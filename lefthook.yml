# https://lefthook.dev/configuration/
# pre-commit: fast local checks for staged changes.
# pre-push: full local verification gates.

pre-commit:
  parallel: true
  commands:
    lefthook-no-fake-pass:
      run: bash scripts/lefthook/check-no-fake-pass.sh
    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    rustfmt:
      glob: "*.rs"
      run: cargo fmt -- {staged_files}
      stage_fixed: true
      skip:
        - merge
        - rebase
    markdownlint:
      glob: "*.md"
      run: pnpm markdownlint-cli2 {staged_files}
    gitleaks:
      run: gitleaks protect --staged --redact -v
      skip:
        - merge
        - rebase
    file-line-limit:
      run: bash scripts/lefthook/file-line-limit.sh
      skip:
        - merge
        - rebase
    panel-no-framework-import-kind:
      glob: "apps/web/lib/panel/**/*.{ts,tsx}"
      run: bash scripts/lefthook/panel-no-framework-import-kind.sh
    panel-no-direct-codec:
      glob: "apps/web/**/*.{ts,tsx}"
      run: bash scripts/lefthook/panel-no-direct-codec.sh
    panel-no-state-without-router:
      glob: "apps/web/stores/**/*.{ts,tsx}"
      run: bash scripts/lefthook/panel-no-state-without-router.sh
    catalog-m1-boundary:
      run: bash scripts/lefthook/catalog-m1-boundary.sh

pre-push:
  parallel: false
  commands:
    lefthook-no-fake-pass:
      run: bash scripts/lefthook/check-no-fake-pass.sh
      skip:
        - merge
        - rebase
    catalog-m1-boundary:
      run: bash scripts/lefthook/catalog-m1-boundary.sh
      skip:
        - merge
        - rebase
    typecheck:
      run: pnpm install --frozen-lockfile --reporter=silent && pnpm typecheck
      skip:
        - merge
        - rebase
    cargo-check:
      run: cargo check --workspace --all-features
      skip:
        - merge
        - rebase
    cargo-clippy:
      run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      skip:
        - merge
        - rebase
    sqlx-prepare-check:
      run: cargo sqlx prepare --workspace --check
      skip:
        - merge
        - rebase
    markdown-links:
      run: bash scripts/ci/check-markdown-links.sh
      skip:
        - merge
        - rebase

# commit-msg is enforced by CI/Spectral or a separate rule.
# Conventional Commits format: docs/conventions/git-and-pr.md
