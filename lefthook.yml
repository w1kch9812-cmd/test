# https://lefthook.dev/configuration/
# pre-commit: 빠른 lint + 포맷 + 시크릿 스캔
# pre-push: 깊은 검증 (typecheck, cargo, link check)
# commit-msg: Conventional Commits 강제

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    rustfmt:
      glob: "*.rs"
      run: cargo fmt -- {staged_files}
      stage_fixed: true
      skip:
        - merge
        - rebase
    markdownlint:
      glob: "*.md"
      run: pnpm markdownlint-cli2 {staged_files}
    gitleaks:
      run: gitleaks protect --staged --redact -v
      skip:
        # gitleaks 미설치 환경에선 일시 skip. CI에서 강제됨.
        - merge
        - rebase
    file-size:
      run: |
        for f in {staged_files}; do
          # docs/superpowers/ 는 plan/spec 프로세스 산출물이라 예외
          case "$f" in
            docs/superpowers/*) continue ;;
            _archive/*) continue ;;
            reference/*) continue ;;
          esac
          if [ -f "$f" ]; then
            lines=$(wc -l < "$f" 2>/dev/null || echo 0)
            if [ "$lines" -gt 1500 ]; then
              echo "❌ $f has $lines lines (> 1500). 폴더로 분해하세요."
              exit 1
            elif [ "$lines" -gt 500 ]; then
              echo "⚠️  $f has $lines lines (> 500). 가능하면 분해를 검토하세요."
            fi
          fi
        done

pre-push:
  parallel: false
  commands:
    typecheck:
      run: pnpm turbo run typecheck
      skip:
        - merge
        - rebase
    cargo-check:
      run: cargo check --workspace --all-features
      skip:
        # Rust 미설치 환경에선 일시 skip. CI에서 강제됨.
        - merge
        - rebase
    cargo-clippy:
      run: cargo clippy --workspace --all-features -- -D warnings
      skip:
        - merge
        - rebase
    markdown-links:
      run: pnpm markdown-link-check -q docs/**/*.md README.md AGENTS.md
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    conventional:
      run: |
        head -1 {1} | grep -qE '^(feat|fix|chore|docs|test|refactor|perf|ci|build|revert|style)(\(.+\))?: .+' || {
          echo "❌ Conventional Commits 형식이 아니에요:"
          echo "   feat|fix|chore|docs|test|refactor|perf|ci|build|revert|style(scope?): message"
          echo "   예: feat(listing): 매물 검색 API 추가"
          exit 1
        }
