    typecheck:
      run: bash scripts/ci/check-workspace-typecheck-coverage.sh && bash scripts/ci/run-bazel-workspace-typecheck.sh
      skip:
        - merge
        - rebase
    bazel-workspace-graph:
      run: bash scripts/ci/run-bazel.sh test //... --config=ci --verbose_failures
      skip:
        - merge
