name: SP9 Base Layer Cleanup (L6 Lifecycle)

# ADR 0036 / platform-core ADR 0004 이후 vector tile artifact lifecycle owner 는
# platform-core Catalog. Gongzzang 쪽 R2 prefix cleanup 은 비활성.
#
# 매월 15일 02:00 KST cron — `gold/<old-version>/` + `gold/staging/<old-version>/`
# 삭제 (rollback retention 보존: 최근 3 version 유지).
#
# 정책 (L6 Lifecycle):
#   - **3 version 유지** — `gold/manifest.json` 의 `current_version` + 직전 2 version.
#   - 그 이전 version 의 flat tile + staging spec 삭제 (R2 storage 비용 절감).
#   - DRY-RUN 기본 (workflow_dispatch input `confirm_delete=false` 일 때 list 만).

on:
  schedule:
    # 매월 15일 02:00 KST = 14일 17:00 UTC. cron 빌드 (1일) 와 충돌 회피.
    - cron: "0 17 14 * *"
  workflow_dispatch:
    inputs:
      retention_count:
        description: "유지할 최근 version 수 (default 3)"
        required: false
        default: "3"
      confirm_delete:
        description: "true 시 실 삭제. false (default) = dry-run list 만."
        required: false
        default: "false"
        type: boolean

concurrency:
  group: sp9-base-layer-cleanup
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  cleanup:
    name: R2 prefix cleanup disabled (platform-core owns artifacts)
    if: ${{ false }}
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Platform-core artifact owner notice
        run: |
          echo "::notice::Vector tile artifact lifecycle now belongs to platform-core Catalog."
