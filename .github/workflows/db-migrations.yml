name: db-migrations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  POSTGRES_USER: gongzzang
  POSTGRES_PASSWORD: ci_only_changeme
  POSTGRES_DB: gongzzang

jobs:
  migrate:
    name: Full migrations + schema invariants
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: gongzzang
          POSTGRES_PASSWORD: ci_only_changeme
          POSTGRES_DB: gongzzang
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U gongzzang"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://gongzzang:ci_only_changeme@localhost:5432/gongzzang

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2 (SHA pin, ADR 0028)

      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (SHA pin, ADR 0028)
        with: { toolchain: "1.91.1" }

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1 (SHA pin, ADR 0028)
        with:
          shared-key: sqlx-cli

      - name: Install sqlx-cli + postgres client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
          cargo install sqlx-cli --version 0.8.6 --locked --no-default-features --features postgres,rustls

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U gongzzang && break
            sleep 1
          done

      # Native replacements for the deleted ci_migration_v001_full /
      # ci_migration_v002_audit_immutable graph-build transition targets, which
      # only invoked these same shell scripts via run_ci_transition_task.sh.
      - name: Apply full migration chain + schema invariants
        run: bash tests/migrations/test_v001_full.sh

      - name: Apply V002 migrations + audit immutable
        run: bash tests/migrations/test_v002_audit_immutable.sh
