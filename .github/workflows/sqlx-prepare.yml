name: sqlx-prepare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  drift-check:
    name: SQLx offline metadata check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (Node 24 SHA pin, ADR 0028)

      - name: Install Bazelisk
        run: |
          mkdir -p "${RUNNER_TEMP}/bazelisk"
          bash tools/bazel/install_bazelisk_ci.sh "${RUNNER_TEMP}/bazelisk"
          echo "${RUNNER_TEMP}/bazelisk" >> "${GITHUB_PATH}"

      - name: Check committed SQLx metadata
        run: bazelisk test //:sqlx_prepare_verification --config=ci --verbose_failures
