name: SP9 Base Layer Validation

# Focused validation for SP9 ETL changes. The general CI workflow still runs
# workspace-level Rust and frontend gates; this workflow adds ETL-specific
# binary, mini-fixture, Docker, and scraper checks.

on:
  pull_request:
    branches: [main]
    paths:
      - "services/etl-base-layer/**"
      - "services/scraper-py/**"
      - ".github/workflows/sp9-base-layer-*.yml"
  push:
    branches: [main]
    paths:
      - "services/etl-base-layer/**"
      - "services/scraper-py/**"
      - ".github/workflows/sp9-base-layer-*.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # TIPPECANOE_VERSION is injected from the sp9-base-layer-config SSOT.
  # This workflow intentionally hardcodes no Tippecanoe version.

jobs:
  rust-focused:
    name: cargo test/clippy (etl-base-layer + sp9-base-layer-config)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 (Round 5 SHA pin, ADR 0028)
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17 # @stable (Round 5 SHA pin, ADR 0028)
        with: { toolchain: "1.91.1", components: "clippy" }
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.5 (Round 5 SHA pin, ADR 0028)
        with: { shared-key: sp9-etl }
      - name: cargo clippy (sp9-base-layer-config + etl-base-layer)
        run: |
          cargo clippy -p sp9-base-layer-config --all-targets --frozen -- -D warnings
          cargo clippy -p etl-base-layer --all-targets --frozen -- -D warnings
      - name: cargo test
        run: |
          cargo test -p sp9-base-layer-config --all-features --frozen
          cargo test -p etl-base-layer --all-features --frozen

  tippecanoe-smoke:
    name: tippecanoe smoke (mini-fixture)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 (Round 5 SHA pin, ADR 0028)

      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17 # @stable (Round 5 SHA pin, ADR 0028)
        with: { toolchain: "1.91.1" }
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.5 (Round 5 SHA pin, ADR 0028)
        with: { shared-key: sp9-etl }

      - name: Load SSOT config into GITHUB_ENV
        run: |
          cargo run -q -p sp9-base-layer-config --bin sp9-config-print --frozen -- env \
            >> "$GITHUB_ENV"

      - name: Install build deps + GDAL (pinned via SSOT)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential libsqlite3-dev zlib1g-dev "gdal-bin=${GDAL_VERSION_PIN}"

      - name: Build and install tippecanoe (SSOT SHA pin)
        run: |
          mkdir -p /tmp/tippecanoe && cd /tmp/tippecanoe
          git init -q
          git remote add origin https://github.com/felt/tippecanoe.git
          git fetch --depth 1 origin "${TIPPECANOE_GIT_SHA}"
          git checkout FETCH_HEAD
          actual="$(git rev-parse HEAD)"
          if [ "$actual" != "${TIPPECANOE_GIT_SHA}" ]; then
            echo "::error::tippecanoe SHA mismatch: expected ${TIPPECANOE_GIT_SHA}, got ${actual}"
            exit 1
          fi
          make -j"$(nproc)"
          sudo make install

      - name: Verify external tools
        run: |
          tippecanoe --version
          tile-join --version
          which tippecanoe-decode
          ogr2ogr --version

      - name: Build etl-base-layer (release, --frozen)
        run: cargo build -p etl-base-layer --release --frozen

      - name: Create mini fixture GeoJSON
        run: |
          mkdir -p var/sample
          cat > var/sample/mini.geojson <<'EOF'
          {
            "type": "FeatureCollection",
            "features": [
              {
                "type": "Feature",
                "geometry": {
                  "type": "Polygon",
                  "coordinates": [[
                    [127.04, 37.50],
                    [127.05, 37.50],
                    [127.05, 37.51],
                    [127.04, 37.51],
                    [127.04, 37.50]
                  ]]
                },
                "properties": { "pnu": "1168010100107370000" }
              }
            ]
          }
          EOF

      - name: Run gold build (parcels, mini-fixture)
        env:
          # Mini fixture output is intentionally smaller than production data.
          VERIFY_MIN_BYTES: "100"
        run: |
          ./target/release/etl-base-layer gold \
            --layer parcels \
            --output ./var/gold/v_smoke \
            ./var/sample/mini.geojson

      - name: Sanity check output
        run: |
          test -f ./var/gold/v_smoke/parcels.pmtiles
          test -d ./var/gold/v_smoke/parcels
          first_tile="$(find ./var/gold/v_smoke/parcels/17 -type f -print -quit)"
          if [ -z "$first_tile" ]; then
            echo "::error::expected at least one z17 tile file"
            exit 1
          fi
          printf 'first z17 tile: %s\n' "$first_tile"

      - name: Decode and verify exact PNU match
        run: |
          decoded="$(tippecanoe-decode -l parcels \
            ./var/gold/v_smoke/parcels.pmtiles 17 111789 50783)"
          found="$(echo "$decoded" | jq '
            ([.features // empty, (.[] // empty | .features // empty)] | add // [])
            | map(.properties.pnu // empty) | any(. == "1168010100107370000")
          ')"
          if [ "$found" != "true" ]; then
            echo "::error::Gangnam PNU not found in z17 tile (decode: ${decoded:0:200}...)"
            exit 1
          fi
          echo "Gangnam PNU exact-match in z17 tile"

  docker-build:
    name: Dockerfile.etl build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 (Round 5 SHA pin, ADR 0028)
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.10.0 (Round 5 SHA pin, ADR 0028)
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17 # @stable (Round 5 SHA pin, ADR 0028)
        with: { toolchain: "1.91.1" }
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.5 (Round 5 SHA pin, ADR 0028)
        with: { shared-key: sp9-etl }

      - name: Load SSOT config into GITHUB_ENV
        run: |
          cargo run -q -p sp9-base-layer-config --bin sp9-config-print --frozen -- env \
            >> "$GITHUB_ENV"

      - name: Build without push using SSOT Tippecanoe version
        uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991 # v6.10.0 (Round 5 SHA pin, ADR 0028)
        with:
          context: .
          file: services/etl-base-layer/Dockerfile.etl
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIMESTAMP=${{ github.event.repository.updated_at }}
            TIPPECANOE_VERSION=${{ env.TIPPECANOE_VERSION }}
          tags: gongzzang/etl-base-layer:pr-${{ github.event.number || github.run_id }}

  scraper-py:
    name: scraper-py lint + import
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 (Round 5 SHA pin, ADR 0028)
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0 (Round 5 SHA pin, ADR 0028)
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/scraper-py/requirements.txt
      - name: pip install
        working-directory: services/scraper-py
        run: |
          python -m pip install 'pip==24.3.1'
          pip install -r requirements.txt
          pip install 'ruff==0.7.4'
      - name: ruff check (mandatory)
        working-directory: services/scraper-py
        run: python -m ruff check .
      - name: import smoke (script not executed)
        working-directory: services/scraper-py
        run: python -c "import dtmk_vworld; print('import OK')"
