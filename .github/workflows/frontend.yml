name: frontend

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/api-types/**"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "biome.json"
      - ".npmrc"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/api-types/**"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "biome.json"
      - ".npmrc"
      - ".github/workflows/frontend.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: lint / typecheck / unit / e2e / a11y / bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    # Placeholder production-grade env so `next build` passes lib/env.ts validation
    # (https URLs, explicit secrets). Mirrors what the deleted graph-build
    # next_production_build rule injected via its `env = {...}` map.
    env:
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_API_BASE_URL: https://api.gongzzang.invalid
      NEXT_PUBLIC_PLATFORM_CORE_BASE_URL: https://platform-core.gongzzang.invalid
      NEXT_PUBLIC_NAVER_MAPS_CLIENT_ID: ci-build-naver-client-id
      ZITADEL_ISSUER: https://auth.gongzzang.invalid
      ZITADEL_CLIENT_ID: ci-production-client
      ZITADEL_AUDIENCE: ci-production-audience
      ZITADEL_REDIRECT_URI: https://gongzzang.invalid/api/auth/callback
      SESSION_SECRET: ci-production-session-secret-32-valid-x
      INTERNAL_AUTH_SECRET: ci-internal-auth-secret-32-valid-pad
      PLATFORM_CORE_WEBHOOK_SECRET: ci-platform-core-webhook-secret-32-valid
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.2 (SHA pin, ADR 0028)

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8 (SHA pin, ADR 0028)
        with: { version: 9.12.0 }

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (SHA pin, ADR 0028)
        with:
          node-version: "20.19.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Native replacements for the deleted graph-build frontend targets
      # (frontend_lint / frontend_typecheck / frontend_unit_test /
      #  frontend_build / frontend_bundle / frontend_e2e).
      - name: Biome check
        run: pnpm biome check .

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Unit tests
        run: pnpm turbo test

      - name: Redis-backed integration tests
        run: pnpm --filter=@gongzzang/web run test:integration

      - name: Build
        run: pnpm turbo build
        env:
          # next build runs in production mode; lib/env.ts requires a non-loopback
          # rediss:// URL there. The job-level loopback REDIS_URL is for the unit
          # tests (real redis service); override it for the production build only.
          REDIS_URL: rediss://redis.gongzzang.invalid:6379

      - name: Bundle size
        run: pnpm --filter=@gongzzang/web run test:bundle

      - name: Install Playwright browsers
        run: pnpm --filter=@gongzzang/web exec playwright install chromium --with-deps
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/ms-playwright

      - name: Playwright e2e + a11y
        run: pnpm --filter=@gongzzang/web run test:e2e
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/ms-playwright
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
          NEXT_PUBLIC_PLATFORM_CORE_BASE_URL: http://localhost:18082
          NEXT_PUBLIC_NAVER_MAPS_CLIENT_ID: ci-e2e-naver-client
          ZITADEL_ISSUER: http://localhost:8443
          ZITADEL_CLIENT_ID: ci-placeholder
          ZITADEL_AUDIENCE: ci-placeholder
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-test-secret-32-bytes-or-more-padding-padding
          INTERNAL_AUTH_SECRET: ci-e2e-internal-auth-secret-32-valid
          PLATFORM_CORE_WEBHOOK_SECRET: ci-e2e-platform-core-webhook-secret-32
          # Playwright runtime derives the local callback URL from its managed baseURL.
          # Do not override ZITADEL_REDIRECT_URI here; that can desync CI from the
          # isolated Playwright port and attach tests to the wrong local app.

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1 (SHA pin, ADR 0028)
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
