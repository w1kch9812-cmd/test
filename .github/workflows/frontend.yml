name: frontend

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/api-types/**"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "biome.json"
      - ".npmrc"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/api-types/**"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "biome.json"
      - ".npmrc"
      - ".github/workflows/frontend.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  frontend:
    name: lint / typecheck / unit / e2e / a11y / bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.2 (Node 24 SHA pin, ADR 0028)

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8 (Node 24 SHA pin, ADR 0028)

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (Node 24 SHA pin, ADR 0028)
        with:
          node-version: "20.19.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome lint (root)
        run: pnpm lint

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: Vitest unit
        run: pnpm test

      - name: Build (production)
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.gongzzang.example
          NEXT_PUBLIC_PLATFORM_CORE_BASE_URL: https://platform-core.gongzzang.example
          NEXT_PUBLIC_NAVER_MAPS_CLIENT_ID: ci-build-naver-client
          ZITADEL_ISSUER: https://auth.gongzzang.example
          ZITADEL_CLIENT_ID: ci-build-client
          ZITADEL_AUDIENCE: ci-build-audience
          ZITADEL_REDIRECT_URI: https://gongzzang.example/api/auth/callback
          REDIS_URL: rediss://redis.gongzzang.example:6379
          SESSION_SECRET: ci-build-session-secret-32-bytes-valid
          INTERNAL_AUTH_SECRET: ci-build-internal-auth-secret-32-valid
          PLATFORM_CORE_WEBHOOK_SECRET: ci-build-platform-core-webhook-secret-32-valid

      - name: Bundle size budget
        run: pnpm --filter=@gongzzang/web test:bundle

      - name: Install Playwright browsers
        run: pnpm --filter=@gongzzang/web exec playwright install chromium --with-deps

      - name: Playwright e2e + a11y
        run: pnpm --filter=@gongzzang/web test:e2e
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
          NEXT_PUBLIC_PLATFORM_CORE_BASE_URL: http://localhost:18082
          NEXT_PUBLIC_NAVER_MAPS_CLIENT_ID: ci-e2e-naver-client
          ZITADEL_ISSUER: http://localhost:8443
          ZITADEL_CLIENT_ID: ci-placeholder
          ZITADEL_AUDIENCE: ci-placeholder
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-test-secret-32-bytes-or-more-padding-padding
          INTERNAL_AUTH_SECRET: ci-e2e-internal-auth-secret-32-valid
          PLATFORM_CORE_WEBHOOK_SECRET: ci-e2e-platform-core-webhook-secret-32
          # Playwright runtime derives the local callback URL from its managed baseURL.
          # Do not override ZITADEL_REDIRECT_URI here; that can desync CI from the
          # isolated Playwright port and attach tests to the wrong local app.

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1 (Node 24 SHA pin, ADR 0028)
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
