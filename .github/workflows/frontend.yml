name: frontend

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/api-types/**"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "biome.json"
      - ".npmrc"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/api-types/**"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "biome.json"
      - ".npmrc"
      - ".github/workflows/frontend.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: lint / typecheck / unit / e2e / a11y / bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome lint (root)
        run: pnpm lint

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: Vitest unit
        run: pnpm test

      - name: Build (production)
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
          ZITADEL_ISSUER: http://localhost:8443
          ZITADEL_CLIENT_ID: build-time-placeholder
          ZITADEL_AUDIENCE: build-time-placeholder
          ZITADEL_REDIRECT_URI: http://localhost:3000/api/auth/callback
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-build-placeholder-32-bytes-padding-padding

      - name: Bundle size budget
        run: pnpm --filter=@gongzzang/web test:bundle

      - name: Install Playwright browsers
        run: pnpm --filter=@gongzzang/web exec playwright install chromium --with-deps

      - name: Playwright e2e + a11y
        run: pnpm --filter=@gongzzang/web test:e2e
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
          ZITADEL_ISSUER: http://localhost:8443
          ZITADEL_CLIENT_ID: ci-placeholder
          ZITADEL_AUDIENCE: ci-placeholder
          ZITADEL_REDIRECT_URI: http://localhost:3000/api/auth/callback
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-test-secret-32-bytes-or-more-padding-padding
          # ZITADEL_E2E_REAL 미설정 → auth.spec.ts 의 Zitadel-dependent test (시나리오 4-5) 는
          # test.skip(ZITADEL_E2E_REAL !== "true") 으로 graceful skip.
          # 시나리오 1-3 (login UI / 미인증 redirect / forbidden) 는 placeholder env 로 Next.js
          # dev server 가 정상 기동 후 실행. 진짜 Zitadel e2e 는 SP6-iam-infra 의 ephemeral env.

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
