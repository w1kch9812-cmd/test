name: frontend

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/api-types/**"
      - "tools/bazel/**"
      - ".bazelignore"
      - ".bazelrc"
      - ".bazelversion"
      - "BUILD.bazel"
      - "MODULE.bazel"
      - "REPO.bazel"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "biome.json"
      - ".npmrc"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/api-types/**"
      - "tools/bazel/**"
      - ".bazelignore"
      - ".bazelrc"
      - ".bazelversion"
      - "BUILD.bazel"
      - "MODULE.bazel"
      - "REPO.bazel"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "biome.json"
      - ".npmrc"
      - ".github/workflows/frontend.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  frontend:
    name: lint / typecheck / unit / e2e / a11y / bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (Node 24 SHA pin, ADR 0028)

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8 (Node 24 SHA pin, ADR 0028)

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (Node 24 SHA pin, ADR 0028)
        with:
          node-version: "20.19.0"
          cache: "pnpm"

      - name: Install Bazelisk
        run: |
          mkdir -p "${RUNNER_TEMP}/bazelisk"
          bash tools/bazel/install_bazelisk_ci.sh "${RUNNER_TEMP}/bazelisk"
          echo "${RUNNER_TEMP}/bazelisk" >> "${GITHUB_PATH}"

      - name: Frontend lint / typecheck / unit (Bazel)
        run: bazelisk test //:frontend_lint //:frontend_typecheck //:frontend_unit_test --config=ci --verbose_failures

      - name: Frontend build / bundle (Bazel)
        run: bazelisk test //:frontend_build //:frontend_bundle --config=ci --verbose_failures

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter=@gongzzang/web exec playwright install chromium --with-deps
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/ms-playwright

      - name: Playwright e2e + a11y (Bazel)
        run: bazelisk test //:frontend_e2e --config=ci --verbose_failures
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/ms-playwright
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
          NEXT_PUBLIC_PLATFORM_CORE_BASE_URL: http://localhost:18082
          NEXT_PUBLIC_NAVER_MAPS_CLIENT_ID: ci-e2e-naver-client
          ZITADEL_ISSUER: http://localhost:8443
          ZITADEL_CLIENT_ID: ci-placeholder
          ZITADEL_AUDIENCE: ci-placeholder
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-test-secret-32-bytes-or-more-padding-padding
          INTERNAL_AUTH_SECRET: ci-e2e-internal-auth-secret-32-valid
          PLATFORM_CORE_WEBHOOK_SECRET: ci-e2e-platform-core-webhook-secret-32
          # Playwright runtime derives the local callback URL from its managed baseURL.
          # Do not override ZITADEL_REDIRECT_URI here; that can desync CI from the
          # isolated Playwright port and attach tests to the wrong local app.

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1 (Node 24 SHA pin, ADR 0028)
        with:
          name: playwright-report
          path: bazel-testlogs/**/playwright-report/
          retention-days: 7
