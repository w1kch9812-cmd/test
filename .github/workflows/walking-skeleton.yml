name: walking-skeleton

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  POSTGRES_USER: gongzzang
  POSTGRES_PASSWORD: ci_only_changeme
  POSTGRES_DB: gongzzang

jobs:
  e2e:
    name: API + Auth E2E (Zitadel JWT round-trip)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: gongzzang
          POSTGRES_PASSWORD: ci_only_changeme
          POSTGRES_DB: gongzzang
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U gongzzang"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    # Zitadel은 service container 가 아니라 step 에서 직접 `docker run` 합니다.
    # 이유: Zitadel image entrypoint 가 subcommand 를 요구하는데
    # GitHub Actions service container 는 CMD 인자를 못 넘김 ("Error: no additional command provided").
    env:
      DATABASE_URL: postgres://gongzzang:ci_only_changeme@localhost:5432/gongzzang

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: walking-skeleton

      - name: Install jq + sqlx-cli + postgres client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq postgresql-client
          cargo install sqlx-cli --version 0.8.2 --locked --no-default-features --features postgres,rustls

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U gongzzang && break
            sleep 1
          done

      - name: Apply gongzzang migrations
        run: sqlx migrate run --source migrations

      - name: Create zitadel database (Zitadel requires its own DB)
        run: |
          PGPASSWORD=ci_only_changeme psql -h localhost -U gongzzang -d gongzzang \
            -c "CREATE DATABASE zitadel;"

      - name: Start Zitadel container (docker run, joining postgres network)
        id: zitadel_id
        run: |
          # GitHub Actions service container 가 만든 docker network 이름을 찾음
          NET=$(docker network ls --filter "name=github_network_" --format '{{.Name}}' | head -1)
          if [ -z "$NET" ]; then
            echo "ERROR: github_network not found" >&2
            docker network ls >&2
            exit 1
          fi
          echo "Joining network: $NET"

          # PAT 를 호스트 파일시스템에 쓰도록 ZITADEL_FIRSTINSTANCE_PATPATH 사용
          # /zitadel-pat 는 컨테이너 내부 경로, /tmp/zitadel-pat 는 호스트 마운트
          mkdir -p /tmp/zitadel-pat
          chmod 777 /tmp/zitadel-pat

          # Zitadel 을 master-key 와 함께 start-from-init 으로 실행
          ZID=$(docker run -d \
            --name zitadel-ci \
            --network "$NET" \
            --network-alias zitadel \
            -p 8081:8080 \
            -v /tmp/zitadel-pat:/zitadel-pat \
            -e ZITADEL_DATABASE_POSTGRES_HOST=postgres \
            -e ZITADEL_DATABASE_POSTGRES_PORT=5432 \
            -e ZITADEL_DATABASE_POSTGRES_DATABASE=zitadel \
            -e ZITADEL_DATABASE_POSTGRES_USER_USERNAME=gongzzang \
            -e ZITADEL_DATABASE_POSTGRES_USER_PASSWORD=ci_only_changeme \
            -e ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE=disable \
            -e ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME=gongzzang \
            -e ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD=ci_only_changeme \
            -e ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE=disable \
            -e ZITADEL_EXTERNALSECURE=false \
            -e ZITADEL_EXTERNALDOMAIN=localhost \
            -e ZITADEL_EXTERNALPORT=8081 \
            -e ZITADEL_PORT=8080 \
            -e ZITADEL_TLS_ENABLED=false \
            -e ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED=false \
            -e ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME=zitadel-admin-sa \
            -e ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME=Admin \
            -e ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE=2099-01-01T00:00:00Z \
            -e ZITADEL_FIRSTINSTANCE_PATPATH=/zitadel-pat/pat.txt \
            ghcr.io/zitadel/zitadel:latest \
            start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled)

          echo "Zitadel container ID: $ZID"
          echo "container_id=$ZID" >> "$GITHUB_OUTPUT"
          # 1초 후 컨테이너가 살아있는지 확인 (초기 immediate exit 잡기)
          sleep 3
          if ! docker ps --filter "id=$ZID" --filter status=running -q | grep -q .; then
            echo "ERROR: Zitadel exited immediately" >&2
            docker logs "$ZID" >&2
            exit 1
          fi

      - name: Wait for Zitadel HTTP healthz
        run: |
          for i in {1..180}; do
            if curl -sf http://localhost:8081/debug/healthz >/dev/null 2>&1; then
              echo "Zitadel healthz OK after ${i}s"
              break
            fi
            if [ "$i" = "180" ]; then
              echo "ERROR: Zitadel did not become healthy in 180s" >&2
              docker logs --tail 200 "${{ steps.zitadel_id.outputs.container_id }}" >&2 || true
              exit 1
            fi
            sleep 1
          done

      - name: Read Zitadel admin PAT from mounted file
        id: zitadel_admin
        run: |
          ZID="${{ steps.zitadel_id.outputs.container_id }}"
          PAT=""
          for i in {1..120}; do
            if [ -f /tmp/zitadel-pat/pat.txt ] && [ -s /tmp/zitadel-pat/pat.txt ]; then
              PAT=$(cat /tmp/zitadel-pat/pat.txt | tr -d '\r\n')
              if [ -n "$PAT" ] && [ "${#PAT}" -gt 30 ]; then
                echo "PAT file ready after ${i}s (len=${#PAT})"
                break
              fi
            fi
            sleep 2
          done
          if [ -z "$PAT" ]; then
            echo "ERROR: PAT file not produced at /tmp/zitadel-pat/pat.txt" >&2
            ls -la /tmp/zitadel-pat/ >&2 || true
            echo "=== Zitadel logs (tail 200) ===" >&2
            docker logs --tail 200 "$ZID" 2>&1 >&2 || true
            exit 1
          fi
          echo "::add-mask::$PAT"
          echo "pat=$PAT" >> "$GITHUB_OUTPUT"
          echo "Got admin PAT (length=${#PAT})"

      - name: Setup Zitadel project + OIDC app + machine user
        id: zitadel
        env:
          ZITADEL_ADMIN_PAT: ${{ steps.zitadel_admin.outputs.pat }}
          ZITADEL_URL: http://localhost:8081
        run: bash tests/walking-skeleton/zitadel-setup.sh

      - name: Build API
        run: cargo build --package api --release

      - name: Run API in background
        env:
          ZITADEL_ISSUER: ${{ steps.zitadel.outputs.issuer }}
          ZITADEL_AUDIENCE: ${{ steps.zitadel.outputs.audience }}
        run: |
          ./target/release/api > /tmp/api.log 2>&1 &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV
          for i in {1..30}; do
            if curl -sf http://localhost:8080/healthz >/dev/null 2>&1; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8080/healthz || (echo "API failed to start"; cat /tmp/api.log; exit 1)

      - name: E2E [1/4] — public /healthz no auth → 200
        run: |
          BODY=$(curl -sf http://localhost:8080/healthz)
          if [ "$BODY" != "ok" ]; then echo "FAIL: /healthz expected 'ok', got '$BODY'"; exit 1; fi
          echo "PASS: /healthz=ok"

      - name: E2E [2/4] — protected /users/me without token → 401
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/users/me)
          if [ "$STATUS" != "401" ]; then
            echo "FAIL: /users/me expected 401, got $STATUS"
            cat /tmp/api.log
            exit 1
          fi
          echo "PASS: /users/me without auth returns 401"

      - name: E2E [3/4] — first sign-in auto-creates User
        env:
          TOKEN: ${{ steps.zitadel.outputs.token }}
        run: |
          RESP=$(curl -sf -H "Authorization: Bearer $TOKEN" http://localhost:8080/users/me) || {
            echo "FAIL: GET /users/me with token failed"
            cat /tmp/api.log
            exit 1
          }
          echo "$RESP" | jq .
          USER_ID=$(echo "$RESP" | jq -r .id)
          ZSUB=$(echo "$RESP" | jq -r .zitadel_sub)
          if [ -z "$USER_ID" ] || [ "$USER_ID" = "null" ]; then echo "FAIL: no id"; exit 1; fi
          if [ -z "$ZSUB" ] || [ "$ZSUB" = "null" ]; then echo "FAIL: no zitadel_sub"; exit 1; fi
          echo "USER_ID=$USER_ID" >> $GITHUB_ENV
          echo "PASS: first sign-in id=$USER_ID sub=$ZSUB"

      - name: E2E [4/4] — second call with same token returns same User (no duplicate)
        env:
          TOKEN: ${{ steps.zitadel.outputs.token }}
        run: |
          RESP=$(curl -sf -H "Authorization: Bearer $TOKEN" http://localhost:8080/users/me)
          USER_ID2=$(echo "$RESP" | jq -r .id)
          if [ "$USER_ID2" != "$USER_ID" ]; then
            echo "FAIL: duplicate user — first=$USER_ID second=$USER_ID2"
            exit 1
          fi
          ROW_COUNT=$(PGPASSWORD=ci_only_changeme psql -h localhost -U gongzzang -d gongzzang -t -A -c 'select count(*) from "user";')
          if [ "$ROW_COUNT" != "1" ]; then
            echo "FAIL: expected 1 user row, got $ROW_COUNT"
            exit 1
          fi
          echo "PASS: same id ($USER_ID), 1 user row"

      - name: Dump API log on failure
        if: failure()
        run: |
          echo "=== api.log ==="
          cat /tmp/api.log || true
          echo "=== Zitadel logs (tail 200) ==="
          docker logs --tail 200 "${{ steps.zitadel_id.outputs.container_id }}" || true

      - name: Stop API and Zitadel
        if: always()
        run: |
          if [ -n "${API_PID:-}" ]; then kill $API_PID || true; fi
          docker rm -f zitadel-ci 2>/dev/null || true
