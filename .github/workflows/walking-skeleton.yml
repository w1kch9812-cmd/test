name: walking-skeleton

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  POSTGRES_USER: gongzzang
  POSTGRES_PASSWORD: ci_only_changeme
  POSTGRES_DB: gongzzang

jobs:
  e2e:
    name: API + Auth E2E (mock JWT mode)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: gongzzang
          POSTGRES_PASSWORD: ci_only_changeme
          POSTGRES_DB: gongzzang
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U gongzzang"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgres://gongzzang:ci_only_changeme@localhost:5432/gongzzang

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (SHA pin, ADR 0028)

      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537  # @stable (SHA pin, ADR 0028)
        with: { toolchain: "1.91.1" }

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1 (SHA pin, ADR 0028)
        with:
          shared-key: walking-skeleton

      - name: Install sqlx-cli + postgres client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl postgresql-client python3
          cargo install sqlx-cli --version 0.8.6 --locked --no-default-features --features postgres,rustls

      # Native replacement for the deleted ci_walking_skeleton_e2e graph-build
      # transition target (was just a wrapper around
      # run_ci_transition_task.sh::run_walking_skeleton_e2e).
      - name: Run walking-skeleton E2E
        run: bash scripts/ci/walking-skeleton-e2e.sh

      - name: Dump API log on failure
        if: failure()
        run: |
          echo "=== api.log ==="
          if [ -f /tmp/api.log ]; then
            cat /tmp/api.log
          else
            echo "api.log missing"
          fi
