name: SP9 Base Layer ETL

# 매월 1일 03:00 KST 자동 실행 + workflow_dispatch (manual run).
# 한국 전국 273 시군구 V-World dtmk → PMTiles → R2 publish (Plan D L3 atomicity 와 짝).
#
# Phase 분리:
#   1. Bronze refresh — services/scraper-py/dtmk_vworld.py 로 R2 의 273 zip 갱신.
#                       (size diff 비교 + 변경된 시군구만 부분 다운 — daily diff 패턴.)
#   2. Gold build      — cargo run -p etl-base-layer -- gold --bronze-prefix ...
#                       이 단계가 가장 무거움 — ubuntu-22.04-large (32GB RAM).
#   3. Verify          — VERIFY_* env 가 build-tail 에서 자동 강제 (L2).
#   4. Promote         — manifest pointer flip (L3 atomicity).
#   5. Notify          — Sentry 알림 (실패 시).

on:
  schedule:
    # cron 은 UTC. 03:00 KST = 18:00 UTC (전날). 매월 1일 18:00 UTC.
    - cron: "0 18 1 * *"
  workflow_dispatch:
    inputs:
      layers:
        description: "build 할 layer 목록 (쉼표 구분: parcels,admin,complex)"
        required: false
        default: "parcels,admin,complex"
      bronze_skip:
        description: "Bronze refresh 단계 skip (R2 의 기존 zip 그대로 재사용)"
        required: false
        default: "false"
        type: boolean
      target_version:
        description: "Gold version 라벨 (예: v3 / v_dryrun_2026_05). 미입력 시 v<YYYY-MM>."
        required: false
        default: ""

concurrency:
  # 같은 ref 의 두 번째 ETL 동시 실행 차단 — R2 manifest 충돌 방지.
  group: sp9-base-layer-etl-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # OIDC for Cloudflare R2 (L5 — 다음 commit). 현재는 long-lived key 도 OK.

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # TIPPECANOE_VERSION 등은 setup job 의 sp9-config-print → $GITHUB_OUTPUT 으로 propagate.
  # 본 workflow 에 SSOT hardcode 0.

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Setup — SSOT 의 모든 const + layer 목록을 다른 job 들이 소비하도록 emit.
  # 모든 후속 job 이 needs: [setup] — SSOT drift 차단.
  # ─────────────────────────────────────────────────────────────────────────────
  setup:
    name: Load SSOT config
    runs-on: ubuntu-22.04
    outputs:
      layers_json: ${{ steps.print.outputs.layers_json }}
      active_layers_json: ${{ steps.print.outputs.active_layers_json }}
      tippecanoe_version: ${{ steps.print.outputs.tippecanoe_version }}
      tippecanoe_git_sha: ${{ steps.print.outputs.tippecanoe_git_sha }}
      gdal_version_pin: ${{ steps.print.outputs.gdal_version_pin }}
      rust_toolchain_version: ${{ steps.print.outputs.rust_toolchain_version }}
      dtmk_download_concurrency: ${{ steps.print.outputs.dtmk_download_concurrency }}
      nationwide_pmtiles_min_bytes: ${{ steps.print.outputs.nationwide_pmtiles_min_bytes }}
      dtmk_ds_id: ${{ steps.print.outputs.dtmk_ds_id }}
      dtmk_license: ${{ steps.print.outputs.dtmk_license }}
      dtmk_source_url: ${{ steps.print.outputs.dtmk_source_url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (Round 5 SHA pin, ADR 0028)
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (Round 5 SHA pin, ADR 0028)
        with: { toolchain: "1.88.0" }
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6  # v2.7.5 (Round 5 SHA pin, ADR 0028)
        with: { shared-key: sp9-etl }
      - name: Print SSOT
        id: print
        run: |
          json="$(cargo run -q -p sp9-base-layer-config --bin sp9-config-print --frozen -- json)"
          echo "$json" | jq .
          # 각 key → output (다른 job 이 ${{ needs.setup.outputs.X }} 로 소비).
          # dtmk_ds_id / dtmk_license / dtmk_source_url 은 Round 4 SSOT — workflow YAML
          # 안 모든 V-World 메타 (DS_ID / license / source URL) 가 본 출력 통과.
          for key in tippecanoe_version tippecanoe_git_sha gdal_version_pin rust_toolchain_version dtmk_download_concurrency nationwide_pmtiles_min_bytes dtmk_ds_id dtmk_license dtmk_source_url; do
              val="$(echo "$json" | jq -r ".${key}")"
              echo "${key}=${val}" >> "$GITHUB_OUTPUT"
          done
          # layer 목록은 JSON array 그대로 — fromJson() matrix 입력.
          # `layers` = enum 의 모든 variant (registry 용),
          # `active_layers` = is_active_in_etl()=true 만 (matrix 용, ADR 0027).
          layers_json="$(cargo run -q -p sp9-base-layer-config --bin sp9-config-print --frozen -- layers)"
          echo "layers_json=${layers_json}" >> "$GITHUB_OUTPUT"
          active_layers_json="$(cargo run -q -p sp9-base-layer-config --bin sp9-config-print --frozen -- active_layers)"
          echo "active_layers_json=${active_layers_json}" >> "$GITHUB_OUTPUT"
  # ─────────────────────────────────────────────────────────────────────────────
  # Phase 1: Bronze refresh — V-World dtmk 273 시군구 zip 갱신.
  # 변경된 size 만 다운 (idempotent). 실패해도 phase 2 가 *기존* R2 자산 재사용 가능.
  # ─────────────────────────────────────────────────────────────────────────────
  bronze:
    name: Bronze refresh (dtmk_vworld.py)
    needs: [setup]
    runs-on: ubuntu-22.04
    if: ${{ inputs.bronze_skip != true }}
    timeout-minutes: 90
    outputs:
      manifest_url: ${{ steps.summary.outputs.manifest_url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (Round 5 SHA pin, ADR 0028)
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0 (Round 5 SHA pin, ADR 0028)
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/scraper-py/requirements.txt
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (Round 5 SHA pin, ADR 0028)
        with: { toolchain: "1.88.0" }
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6  # v2.7.5 (Round 5 SHA pin, ADR 0028)
        with: { shared-key: sp9-etl }
      - name: pip install
        working-directory: services/scraper-py
        run: |
          # ADR 0028 — pip 자체도 reproducible pin (`==`) 사용. 자동 upgrade 회피.
          # 모든 supply-chain tool pinned — Codex Round 6 finding #11 fix.
          python -m pip install 'pip==24.3.1'
          pip install -r requirements.txt
          pip install \
            'pip-audit==2.7.3' \
            'cyclonedx-bom==4.7.0' \
            'ruff==0.7.4' \
            'mypy==1.13.0' \
            'pytest==9.0.2'
      - name: Lint (ruff strict)
        working-directory: services/scraper-py
        run: python -m ruff check .
      - name: Type check (mypy)
        working-directory: services/scraper-py
        run: python -m mypy dtmk_vworld.py
      - name: Unit test (pytest)
        working-directory: services/scraper-py
        run: python -m pytest tests/
      - name: pip-audit (Round 3 P0 supply-chain)
        working-directory: services/scraper-py
        run: |
          # known CVE 검출 — pinned 의존성에 vulnerability 가 있으면 즉시 차단.
          # 새 release 가 fix 한 CVE 만 alarm — `--ignore-vuln` 으로 known-mitigated 박제.
          python -m pip_audit -r requirements.txt --strict
      - name: SBOM (CycloneDX, Round 3 P0)
        working-directory: services/scraper-py
        run: |
          python -m cyclonedx_py requirements -i requirements.txt -o python-sbom.json --output-format JSON
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3 (Round 5 SHA pin, ADR 0028)
        with:
          name: scraper-py-sbom
          path: services/scraper-py/python-sbom.json
          retention-days: 90
      - name: Pull SSOT DTMK_DS_ID from setup (Round 4 #1 — single SSOT source)
        id: ssot
        run: |
          # Round 4 P1 — setup job 의 출력을 그대로 사용 (단일 SSOT entry point).
          # 이전: phase 별 cargo run 중복 + 일부는 inline 하드코딩.
          DTMK_DS_ID="${{ needs.setup.outputs.dtmk_ds_id }}"
          if [ -z "$DTMK_DS_ID" ]; then
            echo "::error::setup job 의 dtmk_ds_id output 비어있음"
            exit 1
          fi
          echo "dtmk_ds_id=${DTMK_DS_ID}" >> "$GITHUB_OUTPUT"
      - name: Run dtmk_vworld
        working-directory: services/scraper-py
        env:
          VWORLD_USERNAME: ${{ secrets.VWORLD_USERNAME }}
          VWORLD_PASSWORD: ${{ secrets.VWORLD_PASSWORD }}
          # ADR 0029 — `ETL_ENVIRONMENT=production` + production namespace.
          ETL_ENVIRONMENT: production
          R2_PRODUCTION_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_PRODUCTION_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_PRODUCTION_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_PRODUCTION_BUCKET: ${{ secrets.R2_BUCKET }}
          # SSOT inject — Rust config crate 의 const 단일 출처. Python 측 하드코딩 0.
          DTMK_DS_ID: ${{ steps.ssot.outputs.dtmk_ds_id }}
          # Round 4 SSOT — phase 1 의 ThreadPoolExecutor max_workers 도 sp9-config 의
          # `DTMK_DOWNLOAD_CONCURRENCY` 와 동일 값. 이전 `"3"` 하드코딩 제거.
          DTMK_PARALLEL: ${{ needs.setup.outputs.dtmk_download_concurrency }}
        run: python dtmk_vworld.py
      - name: Summary (SSOT prefix)
        id: summary
        run: |
          # SSOT — Rust 측의 dtmk_bronze_prefix() 와 *동일* format. ssot 단계에서 이미 캐시.
          BATCH="$(date -u +%Y-%m)"
          DTMK_DS_ID="${{ steps.ssot.outputs.dtmk_ds_id }}"
          echo "manifest_url=bronze/${BATCH}/parcel-dtmk-${DTMK_DS_ID}/" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────────
  # Phase 2-3: Gold build + verify. ubuntu-22.04-large (32GB RAM, 16 vCPU) — 1.4억
  # parcel polygon tippecanoe 빌드용. timeout 720분 (12h) — 평균 2-4h, 최악 7h.
  # ─────────────────────────────────────────────────────────────────────────────
  gold:
    name: Gold build + verify (${{ matrix.layer }})
    needs: [setup, bronze]
    # bronze 가 skipped (input: bronze_skip=true) 여도 본 job 진행.
    if: always() && needs.setup.result == 'success' && (needs.bronze.result == 'success' || needs.bronze.result == 'skipped')
    # ubuntu-22.04-large = 16 vCPU + 64GB RAM. 1.4억 polygon tippecanoe 빌드에 필수
    # (default 17GB 에서 OOM 확정). beta runner 라 비용 ~3x — 월 1회만 호출.
    runs-on: ubuntu-22.04-large
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix:
        # SSOT 의 *active* layer 목록 (ADR 0027). admin/complex 는 source 미준비 →
        # `Layer::is_active_in_etl()` false → matrix 에서 자동 제외 → silent partial
        # build (parcels prefix 임시 재사용) trick 차단.
        # 새 layer 추가 또는 admin/complex 활성 시 `crates/sp9-base-layer-config/src/lib.rs`
        # 의 `is_active_in_etl()` 만 변경.
        layer: ${{ fromJson(needs.setup.outputs.active_layers_json) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (Round 5 SHA pin, ADR 0028)

      - name: Install build deps + GDAL (pinned via SSOT)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential libsqlite3-dev zlib1g-dev \
            "gdal-bin=${{ needs.setup.outputs.gdal_version_pin }}"

      - name: Build & install tippecanoe (SSOT SHA pin)
        run: |
          SHA="${{ needs.setup.outputs.tippecanoe_git_sha }}"
          mkdir -p /tmp/tippecanoe && cd /tmp/tippecanoe
          git init -q
          git remote add origin https://github.com/felt/tippecanoe.git
          git fetch --depth 1 origin "$SHA"
          git checkout FETCH_HEAD
          actual="$(git rev-parse HEAD)"
          if [ "$actual" != "$SHA" ]; then
            echo "::error::tippecanoe SHA mismatch — expected $SHA, got $actual"
            exit 1
          fi
          make -j"$(nproc)"
          sudo make install
          tippecanoe --version

      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (Round 5 SHA pin, ADR 0028)
        with: { toolchain: "1.88.0" }
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6  # v2.7.5 (Round 5 SHA pin, ADR 0028)
        with: { shared-key: sp9-etl }

      # Round 3 P0 supply-chain gates (Rust 측). Bronze 측은 phase1 에서 이미 적용.
      - name: cargo-deny (license + advisories + duplicates)
        uses: EmbarkStudios/cargo-deny-action@34899fc7ba81ca6268d5947a7a16b4649013fea1  # v2.0.6 (Round 5 SHA pin, ADR 0028)
        with:
          command: check
      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.7 (Round 5 SHA pin, ADR 0028)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build etl-base-layer (release, --frozen)
        run: cargo build -p etl-base-layer --release --frozen

      - name: SBOM (CycloneDX, Round 3 P0)
        run: |
          cargo install --locked cargo-cyclonedx --version 0.5.7
          cargo cyclonedx -p etl-base-layer --format json -f rust-etl-sbom.json
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3 (Round 5 SHA pin, ADR 0028)
        with:
          name: etl-base-layer-sbom-${{ matrix.layer }}
          path: rust-etl-sbom.json
          retention-days: 90

      - name: Compute version label
        id: ver
        run: |
          if [ -n "${{ inputs.target_version }}" ]; then
            echo "version=${{ inputs.target_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v$(date -u +%Y_%m)" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute Bronze prefix (SSOT helper)
        id: bronze
        run: |
          BATCH="$(date -u +%Y-%m)"
          # SSOT — sp9-base-layer-config 의 dtmk_bronze_prefix() 와 동일 format
          # (Rust + workflow 양쪽 한 source 강제). Round 4 #1 — setup outputs 의 SSOT
          # const 만 통과 (이전: 매 job 마다 cargo run 중복).
          DTMK_DS_ID="${{ needs.setup.outputs.dtmk_ds_id }}"
          PREFIX="bronze/${BATCH}/parcel-dtmk-${DTMK_DS_ID}/"
          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "batch=${BATCH}" >> "$GITHUB_OUTPUT"

      - name: Run gold build (${{ matrix.layer }})
        env:
          # Gold version + R2 자격.
          GOLD_VERSION: ${{ steps.ver.outputs.version }}
          # ADR 0029 — `ETL_ENVIRONMENT=production` + production namespace.
          ETL_ENVIRONMENT: production
          R2_PRODUCTION_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_PRODUCTION_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_PRODUCTION_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_PRODUCTION_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL_BASE: ${{ secrets.R2_PUBLIC_URL_BASE }}
          # L2 verify — default-on (SSOT 의 VERIFY_LANDMARKS 자동 검증).
          # MIN_BYTES override — SSOT 의 NATIONWIDE_PMTILES_MIN_BYTES 와 동일 값.
          VERIFY_MIN_BYTES: ${{ needs.setup.outputs.nationwide_pmtiles_min_bytes }}
          # Round 3 P1 — Sentry traces sampling 활성 + correlation_id (workflow run_id).
          # ADR 0035 — `ETL_BUILD_ENV` 완전 제거. `ETL_ENVIRONMENT` 가 SSOT (위 line 164/285).
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_TRACES_SAMPLE_RATE: "1.0"
          GIT_SHA: ${{ github.sha }}
          CORRELATION_ID: ${{ github.run_id }}
          # Round 3 P1 — license / source URL lineage (V-World dtmk 표준 박제).
          # Round 4 SSOT — license / source URL 모두 sp9-config 단일 출처. 이전엔
          # license 텍스트 하드코딩 + URL 의 dsId 하드코딩 (둘 다 trick).
          ETL_SOURCE_LICENSE: ${{ needs.setup.outputs.dtmk_license }}
          ETL_SOURCE_URL: ${{ needs.setup.outputs.dtmk_source_url }}
        run: |
          # ADR 0027 — admin/complex 는 `Layer::is_active_in_etl()` false 라 matrix 에서
          # 자동 제외. parcels 만 빌드. 향후 admin/complex source 가 결정되면 lib.rs 의
          # is_active_in_etl 을 true 로 변경 + 본 step 에 layer 별 BRONZE_PREFIX 분기.
          ./target/release/etl-base-layer gold \
            --layer "${{ matrix.layer }}" \
            --output "./var/gold/${{ steps.ver.outputs.version }}" \
            --bronze-prefix "${{ steps.bronze.outputs.prefix }}" \
            --concurrency "${{ needs.setup.outputs.dtmk_download_concurrency }}"

      - name: Upload PMTiles artifact (debug)
        if: failure() || inputs.target_version != ''
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3 (Round 5 SHA pin, ADR 0028)
        with:
          name: pmtiles-${{ matrix.layer }}-${{ steps.ver.outputs.version }}
          path: ./var/gold/${{ steps.ver.outputs.version }}/${{ matrix.layer }}.pmtiles
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Phase 4: Promote — disabled.
  # ADR 0036 / platform-core ADR 0004 이후 `gold/manifest.json` owner 는
  # platform-core Catalog 이다. Gongzzang ETL 은 tile artifact 를 만들 수 있지만
  # manifest publish/rollback pointer 는 더 이상 write 하지 않는다.
  # ─────────────────────────────────────────────────────────────────────────────
  promote:
    name: Promote disabled (platform-core owns manifest)
    needs: [setup, gold]
    if: ${{ false }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Platform-core manifest owner notice
        run: |
          echo "::notice::Gongzzang no longer publishes vector tile manifests; use platform-core Catalog."

  # ─────────────────────────────────────────────────────────────────────────────
  # Phase 5: Notify on failure — workflow-level alert.
  # SDK 단계는 etl-base-layer Rust binary 가 SENTRY_DSN env 받아서 직접 emit
  # (gold/promote 에서 panic / error tracing 자동 보고). 본 job 은 workflow runner
  # 자체 실패 (예: tippecanoe build 실패) 의 fallback alert — sentry-cli 사용.
  # ─────────────────────────────────────────────────────────────────────────────
  notify-failure:
    name: Notify failure (workflow-level)
    needs: [bronze, gold, promote]
    if: ${{ always() && (needs.bronze.result == 'failure' || needs.gold.result == 'failure' || needs.promote.result == 'failure') }}
    runs-on: ubuntu-22.04
    steps:
      - name: Sentry CLI alert (proper envelope endpoint)
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # ADR 0028 — sentry-cli version pin. Round 6 finding #14 fix.
          # `curl | bash` 의 remote-script-execution 제거 → GitHub Releases 에서 정적 binary 직접 download.
          SENTRY_CLI_VERSION: "2.41.1"
        run: |
          set -euo pipefail
          # Codex Round 6 finding #13 — production alert path 는 SENTRY_DSN 필수. silent skip 제거.
          if [ -z "${SENTRY_DSN:-}" ]; then
            echo "::error::SENTRY_DSN secret is required for SP9 production alerting (ADR 0028). Set repo secret."
            exit 1
          fi
          # sentry-cli (정적 binary, GitHub Releases) — HTTPS + version pin → curl | bash 대체.
          install_dir="${RUNNER_TEMP:-/tmp}/sentry-cli"
          mkdir -p "${install_dir}"
          curl -sSfL --proto '=https' --tlsv1.2 -o "${install_dir}/sentry-cli" \
            "https://github.com/getsentry/sentry-cli/releases/download/${SENTRY_CLI_VERSION}/sentry-cli-Linux-x86_64"
          chmod +x "${install_dir}/sentry-cli"
          # send-event = 모던 envelope endpoint 사용 (legacy /store/ 와 다름).
          "${install_dir}/sentry-cli" send-event \
            --message "SP9 Base Layer ETL failed (run ${{ github.run_id }})" \
            --level error \
            --tag "workflow:sp9-base-layer-etl" \
            --tag "sha:${{ github.sha }}" \
            --tag "ref:${{ github.ref_name }}" \
            --tag "bronze:${{ needs.bronze.result }}" \
            --tag "gold:${{ needs.gold.result }}" \
            --tag "promote:${{ needs.promote.result }}"
