name: SP9 Manifest Backup Cleanup

# ADR 0036 / platform-core ADR 0004 이후 manifest backup lifecycle owner 는
# platform-core Catalog. Gongzzang 쪽 cleanup command 는 consumer-only 전환으로 비활성.
#
# Round 5 P1 — ADR 0028 + runbook § 6. manifest backup chain 의 최근 12 개만 보존.
# 매월 1일 04:00 UTC (= 13:00 KST), sp9-base-layer-etl.yml 의 promote job 완료 직후.

on:
  schedule:
    # cron 은 UTC. ETL etl.yml 의 cron 은 매월 1일 18:00 UTC. 본 cleanup 은 다음 날
    # 04:00 UTC (= 13:00 KST) — promote 직후 충분 buffer.
    - cron: "0 4 2 * *"
  workflow_dispatch:
    inputs:
      keep:
        description: "보존할 backup 개수 (default 12 = 1년치 monthly cron)"
        required: false
        default: "12"

concurrency:
  # 같은 ref 의 두 번째 cleanup 차단.
  group: sp9-manifest-backup-cleanup-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  cleanup:
    name: Cleanup disabled (platform-core owns manifest)
    if: ${{ false }}
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Platform-core manifest owner notice
        run: |
          echo "::notice::Vector tile manifest backup cleanup now belongs to platform-core Catalog."

  notify-failure:
    name: Notify cleanup failure
    needs: [cleanup]
    if: ${{ always() && needs.cleanup.result == 'failure' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Sentry CLI alert
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # ADR 0028 — sentry-cli version pin. Round 6 finding #14 fix.
          SENTRY_CLI_VERSION: "2.41.1"
        run: |
          set -euo pipefail
          # manifest cleanup 실패는 silent 가 위험 — DSN 필수 (finding #18 fix).
          if [ -z "${SENTRY_DSN:-}" ]; then
            echo "::error::SENTRY_DSN secret is required for backup-cleanup audit alerting (ADR 0028)."
            exit 1
          fi
          install_dir="${RUNNER_TEMP:-/tmp}/sentry-cli"
          mkdir -p "${install_dir}"
          curl -sSfL --proto '=https' --tlsv1.2 -o "${install_dir}/sentry-cli" \
            "https://github.com/getsentry/sentry-cli/releases/download/${SENTRY_CLI_VERSION}/sentry-cli-Linux-x86_64"
          chmod +x "${install_dir}/sentry-cli"
          "${install_dir}/sentry-cli" send-event \
            --message "SP9 manifest backup cleanup failed (run ${{ github.run_id }})" \
            --level error \
            --tag "workflow:sp9-manifest-backup-cleanup" \
            --tag "sha:${{ github.sha }}"
