name: SP9 Manifest Backup Cleanup

# Round 5 P1 — ADR 0028 + runbook § 6. manifest backup chain 의 최근 12 개만 보존.
# 매월 1일 04:00 UTC (= 13:00 KST), sp9-base-layer-etl.yml 의 promote job 완료 직후.

on:
  schedule:
    # cron 은 UTC. ETL etl.yml 의 cron 은 매월 1일 18:00 UTC. 본 cleanup 은 다음 날
    # 04:00 UTC (= 13:00 KST) — promote 직후 충분 buffer.
    - cron: "0 4 2 * *"
  workflow_dispatch:
    inputs:
      keep:
        description: "보존할 backup 개수 (default 12 = 1년치 monthly cron)"
        required: false
        default: "12"

concurrency:
  # 같은 ref 의 두 번째 cleanup 차단.
  group: sp9-manifest-backup-cleanup-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  cleanup:
    name: Cleanup old manifest backups
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2 (Round 5 SHA pin, ADR 0028)
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (Round 5 SHA pin, ADR 0028)
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6  # v2.7.5 (Round 5 SHA pin, ADR 0028)
        with: { shared-key: sp9-etl }

      - name: Build etl-base-layer (release)
        run: cargo build -p etl-base-layer --release --frozen

      - name: Run cleanup
        env:
          # ADR 0029 — Environment 명시 분리 + production namespace 격리.
          ETL_ENVIRONMENT: production
          R2_PRODUCTION_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_PRODUCTION_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_PRODUCTION_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_PRODUCTION_BUCKET: ${{ secrets.R2_BUCKET }}
          # Sentry 통합 — error / partial cleanup 자동 alert.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GIT_SHA: ${{ github.sha }}
          CORRELATION_ID: ${{ github.run_id }}
        run: |
          KEEP="${{ inputs.keep || '12' }}"
          ./target/release/etl-base-layer cleanup-manifest-backups --keep "${KEEP}"

  notify-failure:
    name: Notify cleanup failure
    needs: [cleanup]
    if: ${{ always() && needs.cleanup.result == 'failure' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Sentry CLI alert
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # ADR 0028 — sentry-cli version pin. Round 6 finding #14 fix.
          SENTRY_CLI_VERSION: "2.41.1"
        run: |
          set -euo pipefail
          # manifest cleanup 실패는 silent 가 위험 — DSN 필수 (finding #18 fix).
          if [ -z "${SENTRY_DSN:-}" ]; then
            echo "::error::SENTRY_DSN secret is required for backup-cleanup audit alerting (ADR 0028)."
            exit 1
          fi
          install_dir="${RUNNER_TEMP:-/tmp}/sentry-cli"
          mkdir -p "${install_dir}"
          curl -sSfL --proto '=https' --tlsv1.2 -o "${install_dir}/sentry-cli" \
            "https://github.com/getsentry/sentry-cli/releases/download/${SENTRY_CLI_VERSION}/sentry-cli-Linux-x86_64"
          chmod +x "${install_dir}/sentry-cli"
          "${install_dir}/sentry-cli" send-event \
            --message "SP9 manifest backup cleanup failed (run ${{ github.run_id }})" \
            --level error \
            --tag "workflow:sp9-manifest-backup-cleanup" \
            --tag "sha:${{ github.sha }}"
