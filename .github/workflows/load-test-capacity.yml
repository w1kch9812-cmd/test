name: Load Test Capacity

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Load-test scenario id
        required: true
        default: api-read-mix
        type: choice
        options:
          - api-read-mix
          - map-marker-mix
          - capacity-stress
          - platform-core-events
      profile:
        description: Load profile
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - baseline
          - stress
          - spike
          - soak
      target:
        description: Target base URL, without path/query/fragment
        required: true
        default: https://perf.gongzzang.internal
        type: string
      environment:
        description: Evidence environment label
        required: true
        default: perf
        type: choice
        options:
          - perf
          - staging
          - local
          - ci
      allow_stress:
        description: Required for stress, spike, soak, or capacity-stress runs
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-load-test:
    name: Run k6 load test
    runs-on: [self-hosted, load-test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (Node 24 SHA pin, ADR 0028)

      - name: Run load test
        shell: pwsh
        env:
          LOAD_INPUT_ALLOW_STRESS: ${{ inputs.allow_stress }}
          LOAD_INPUT_ENVIRONMENT: ${{ inputs.environment }}
          LOAD_INPUT_PROFILE: ${{ inputs.profile }}
          LOAD_INPUT_SCENARIO: ${{ inputs.scenario }}
          LOAD_INPUT_TARGET: ${{ inputs.target }}
        run: |
          $runArgs = @(
            "-Scenario", $env:LOAD_INPUT_SCENARIO,
            "-Profile", $env:LOAD_INPUT_PROFILE,
            "-TargetBaseUrl", $env:LOAD_INPUT_TARGET,
            "-Environment", $env:LOAD_INPUT_ENVIRONMENT
          )
          if ([System.Convert]::ToBoolean($env:LOAD_INPUT_ALLOW_STRESS)) {
            $runArgs += "-AllowStress"
          }

          ./scripts/load/run-k6.ps1 @runArgs

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1 (Node 24 SHA pin, ADR 0028)
        if: always()
        with:
          name: load-test-capacity-evidence
          path: target/audit/load-tests/**
          if-no-files-found: warn
          retention-days: 30
