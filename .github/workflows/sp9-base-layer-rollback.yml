name: SP9 Base Layer Rollback

# 긴급 rollback — `gold/manifest.json` 의 current_version 을 *이전 버전* 으로 atomic flip.
#
# 사용 시나리오:
#   - 새 build (예: v_2026_05) 가 prod 배포 직후 client 측 폴리곤 깨짐 발견.
#   - 직전 안정 버전 (예: v_2026_04) 의 staging spec 이 R2 에 *아직* 존재 (L6
#     lifecycle 가 아직 cleanup 안 함).
#   - 본 workflow 실행 → manifest 가 v_2026_04 가리킴 → 즉시 client 안정화.
#
# Rust 측 별도 코드 추가 0 — `promote` subcommand 재사용. 같은 atomicity 보장.

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: "Rollback 할 *이전* 안정 버전 라벨 (예: v_2026_04). gold/staging/<ver>/* 가 R2 에 존재해야 함."
        required: true
        type: string
      reason:
        description: "Rollback 사유 (incident 추적 — Sentry tag 박제)."
        required: true
        type: string

concurrency:
  group: sp9-base-layer-rollback
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rollback:
    name: Rollback (manifest atomic revert)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (Round 5 SHA pin, ADR 0028)
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (Round 5 SHA pin, ADR 0028)
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6  # v2.7.5 (Round 5 SHA pin, ADR 0028)
        with: { shared-key: sp9-etl }

      - name: Pre-check — staging spec 존재 (R2 list)
        env:
          # ADR 0029 — production namespace 격리 (bash 가 직접 R2 access).
          ETL_ENVIRONMENT: production
          R2_PRODUCTION_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_PRODUCTION_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_PRODUCTION_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_PRODUCTION_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          # `aws-cli` (s3 호환) 로 list — staging 누락 시 promote 도 즉시 실패하지만
          # 사용자에게 친절한 사전 경고.
          pip install -q awscli
          export AWS_ACCESS_KEY_ID="${R2_PRODUCTION_ACCESS_KEY}"
          export AWS_SECRET_ACCESS_KEY="${R2_PRODUCTION_SECRET_KEY}"
          export AWS_DEFAULT_REGION=auto
          ENDPOINT="https://${R2_PRODUCTION_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws --endpoint-url "$ENDPOINT" s3 ls \
            "s3://${R2_PRODUCTION_BUCKET}/gold/staging/${{ inputs.target_version }}/" \
            || { echo "::error::staging specs for ${{ inputs.target_version }} not found in R2"; exit 1; }

      - name: Run promote (rollback)
        env:
          # ADR 0029 — production namespace 격리. Rust ETL 가 직접 소비.
          ETL_ENVIRONMENT: production
          R2_PRODUCTION_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_PRODUCTION_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_PRODUCTION_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_PRODUCTION_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL_BASE: ${{ secrets.R2_PUBLIC_URL_BASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          # L4 — Sentry tag 로 rollback incident 박제.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GIT_SHA: ${{ github.sha }}
        run: |
          cargo run -q -p etl-base-layer --frozen --release -- \
            promote --version "${{ inputs.target_version }}"

      - name: Sentry — incident 박제
        if: always()
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          if [ -z "${SENTRY_DSN:-}" ]; then exit 0; fi
          curl -sL https://sentry.io/get-cli/ | bash
          status="${{ job.status }}"
          sentry-cli send-event \
            --message "SP9 Base Layer ROLLBACK to ${{ inputs.target_version }} (${status})" \
            --level "$([ "$status" = success ] && echo warning || echo error)" \
            --tag "workflow:sp9-base-layer-rollback" \
            --tag "target_version:${{ inputs.target_version }}" \
            --tag "actor:${{ github.actor }}" \
            --tag "reason:${{ inputs.reason }}"
