name: SP9 Base Layer Rollback

# ADR 0036 / platform-core ADR 0004 이후 rollback owner 는 platform-core Catalog.
# 이 workflow 는 과거 Gongzzang-owned `gold/manifest.json` rollback 경로라서 비활성.
#
# 긴급 rollback — `gold/manifest.json` 의 current_version 을 *이전 버전* 으로 atomic flip.
#
# 사용 시나리오:
#   - 새 build (예: v_2026_05) 가 prod 배포 직후 client 측 폴리곤 깨짐 발견.
#   - 직전 안정 버전 (예: v_2026_04) 의 staging spec 이 R2 에 *아직* 존재 (L6
#     lifecycle 가 아직 cleanup 안 함).
#   - 본 workflow 실행 → manifest 가 v_2026_04 가리킴 → 즉시 client 안정화.
#
# Rust 측 별도 코드 추가 0 — `promote` subcommand 재사용. 같은 atomicity 보장.

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: "Rollback 할 *이전* 안정 버전 라벨 (예: v_2026_04). gold/staging/<ver>/* 가 R2 에 존재해야 함."
        required: true
        type: string
      reason:
        description: "Rollback 사유 (incident 추적 — Sentry tag 박제)."
        required: true
        type: string

concurrency:
  group: sp9-base-layer-rollback
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rollback:
    name: Rollback disabled (platform-core owns manifest)
    if: ${{ false }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Platform-core manifest owner notice
        run: |
          echo "::notice::Vector tile manifest rollback now belongs to platform-core Catalog."
