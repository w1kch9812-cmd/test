name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: "true"

jobs:
  bazel-fast-graph:
    name: Bazel fast graph
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (Node 24 SHA pin, ADR 0028)

      - name: Install Bazelisk
        run: |
          mkdir -p "${RUNNER_TEMP}/bazelisk"
          bash tools/bazel/install_bazelisk_ci.sh "${RUNNER_TEMP}/bazelisk"
          echo "${RUNNER_TEMP}/bazelisk" >> "${GITHUB_PATH}"

      - name: Bazel test graph
        run: |
          mkdir -p target/bazel/bep target/bazel/profile
          bazelisk test //... --config=ci --verbose_failures \
            --build_event_json_file=target/bazel/bep/ci-test.json \
            --profile=target/bazel/profile/ci-test.gz

      - name: Verification control plane guardrail
        run: bazelisk test //tools/bazel:guardrail_verification_control_plane //tools/bazel:guardrail_verification_control_plane_tests --config=ci --verbose_failures

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1 (Node 24 SHA pin, ADR 0028)
        if: always()
        with:
          name: bazel-fast-graph-evidence
          path: |
            target/bazel/bep/ci-test.json
            target/bazel/profile/ci-test.gz
          if-no-files-found: ignore
          retention-days: 14

  lint-format:
    name: Lint & Format (Bazel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (Node 24 SHA pin, ADR 0028)
      - name: Install Bazelisk
        run: |
          mkdir -p "${RUNNER_TEMP}/bazelisk"
          bash tools/bazel/install_bazelisk_ci.sh "${RUNNER_TEMP}/bazelisk"
          echo "${RUNNER_TEMP}/bazelisk" >> "${GITHUB_PATH}"
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8 (Node 24 SHA pin, ADR 0028)
        with: { version: 9.12.0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 (Node 24 SHA pin, ADR 0028)
        with:
          node-version: "20.19.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Node dependency audit
        run: bazelisk test //tools/bazel:ci_node_audit_transition --config=ci --verbose_failures
      - name: Biome check
        run: bazelisk test //tools/bazel:frontend_lint --config=ci --verbose_failures
      - name: Platform Integration policy guardrail
        shell: pwsh
        run: ./scripts/ci/check-platform-integration-policy.ps1
      - name: Lakehouse Registry integration guardrail
        shell: pwsh
        run: ./scripts/ci/check-lakehouse-registry-integration.ps1
      - name: Lakehouse Registry integration guardrail tests
        shell: pwsh
        run: ./scripts/ci/check-lakehouse-registry-integration.tests.ps1
      - name: Platform Core boundary guardrail
        shell: pwsh
        run: ./scripts/ci/check-platform-core-boundary.ps1
      - name: Platform Core dependency boundary guardrail
        shell: pwsh
        run: ./scripts/ci/check-platform-core-dependency-boundary.ps1
      - name: Platform Core catalog API contract guardrail
        shell: pwsh
        run: ./scripts/ci/check-platform-core-catalog-api-contract.ps1
      - name: Platform Core event receiver contract guardrail
        shell: pwsh
        run: ./scripts/ci/check-platform-core-event-receiver-contract.ps1
      - name: Traffic/auth policy registry guardrail
        shell: pwsh
        run: ./scripts/ci/check-traffic-auth-policy-registry.ps1
      - name: Traffic/auth policy registry guardrail tests
        shell: pwsh
        run: ./scripts/ci/check-traffic-auth-policy-registry.tests.ps1
      - name: Traffic/auth API control-plane guardrail tests
        shell: pwsh
        run: ./scripts/ci/check-traffic-auth-api-control-plane.tests.ps1
      - name: Traffic/auth production edge policy guardrail
        shell: pwsh
        run: ./scripts/ci/check-traffic-auth-policy-registry.ps1 -IncludeProductionEdge
      - name: GitHub Actions Node runtime guardrail
        shell: pwsh
        run: ./scripts/ci/check-github-actions-node-runtime.ps1
      - name: GitHub Actions Node runtime guardrail tests
        shell: pwsh
        run: ./scripts/ci/check-github-actions-node-runtime.tests.ps1
      - name: Migration version prefix guardrail
        shell: pwsh
        run: ./scripts/ci/check-migration-version-prefixes.ps1
      - name: Migration version prefix guardrail tests
        shell: pwsh
        run: ./scripts/ci/check-migration-version-prefixes.tests.ps1
      - name: Platform Core anchor inbox DB approval guardrail
        shell: pwsh
        run: ./scripts/ci/check-platform-core-anchor-inbox-db-approval.ps1
      - name: Platform Core anchor inbox DB approval guardrail tests
        shell: pwsh
        run: ./scripts/ci/check-platform-core-anchor-inbox-db-approval.tests.ps1
      - name: PNU anchor PBF marker contract guardrail
        shell: pwsh
        run: ./scripts/ci/check-pnu-anchor-pbf-marker-contract.ps1
      - name: Load-test asset guardrail
        shell: pwsh
        run: ./scripts/ci/check-load-test-assets.ps1
      - name: Load-test asset guardrail tests
        shell: pwsh
        run: ./scripts/ci/check-load-test-assets.tests.ps1
      - name: Install ripgrep for repository guardrails
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ripgrep
      - name: Forbidden implementation marker guardrail
        run: bash scripts/lefthook/check-forbidden-implementation-markers.sh
      - name: markdownlint
        run: bazelisk test //tools/bazel:guardrail_markdown_links --config=ci --verbose_failures
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (Round 5 SHA pin, ADR 0028)
        with: { toolchain: "1.91.1", components: "rustfmt, clippy" }
      - name: cargo fmt
        run: bazelisk test //tools/bazel:ci_rustfmt_transition --config=ci --verbose_failures
      - name: cargo clippy
        run: bazelisk test //tools/bazel:ci_rust_clippy_transition --config=ci --verbose_failures

  typecheck:
    name: Workspace typecheck (Bazel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (Node 24 SHA pin, ADR 0028)

      - name: Install Bazelisk
        run: |
          mkdir -p "${RUNNER_TEMP}/bazelisk"
          bash tools/bazel/install_bazelisk_ci.sh "${RUNNER_TEMP}/bazelisk"
          echo "${RUNNER_TEMP}/bazelisk" >> "${GITHUB_PATH}"

      - run: bazelisk test //:workspace_typecheck --config=ci --verbose_failures

  cargo-check:
    name: Rust check + cargo-deny (Bazel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (Node 24 SHA pin, ADR 0028)
      - name: Install Bazelisk
        run: |
          mkdir -p "${RUNNER_TEMP}/bazelisk"
          bash tools/bazel/install_bazelisk_ci.sh "${RUNNER_TEMP}/bazelisk"
          echo "${RUNNER_TEMP}/bazelisk" >> "${GITHUB_PATH}"
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (Round 5 SHA pin, ADR 0028)
        with: { toolchain: "1.91.1" }
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1 (Node 24 SHA pin, ADR 0028)
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.8 --locked
      - name: Rust check
        run: bazelisk test //tools/bazel:ci_rust_check_transition --config=ci --verbose_failures
      - name: Cargo deny
        run: bazelisk test //tools/bazel:ci_cargo_deny_transition --config=ci --verbose_failures

  supply-chain-provenance:
    name: Supply chain provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      NEXT_PUBLIC_API_BASE_URL: https://api.perf.gongzzang.internal
      NEXT_PUBLIC_NAVER_MAPS_CLIENT_ID: ci-build-client
      NEXT_PUBLIC_PLATFORM_CORE_BASE_URL: https://platform-core.perf.gongzzang.internal
      ZITADEL_ISSUER: https://auth.perf.gongzzang.internal
      ZITADEL_CLIENT_ID: ci-build-client
      ZITADEL_AUDIENCE: ci-build-audience
      ZITADEL_REDIRECT_URI: https://web.perf.gongzzang.internal/auth/callback
      REDIS_URL: rediss://redis.perf.gongzzang.internal:6379
      SESSION_SECRET: ci-build-session-secret-32-bytes-ok-not-prod
      INTERNAL_AUTH_SECRET: ci-build-internal-auth-secret-32-bytes
      PLATFORM_CORE_WEBHOOK_SECRET: ci-build-platform-core-webhook-secret-32
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (Node 24 SHA pin, ADR 0028)

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8 (Node 24 SHA pin, ADR 0028)
        with: { version: 9.12.0 }

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 (Node 24 SHA pin, ADR 0028)
        with:
          node-version: "20.19.0"
          cache: pnpm

      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (Round 5 SHA pin, ADR 0028)
        with: { toolchain: "1.91.1" }

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1 (Node 24 SHA pin, ADR 0028)

      - run: pnpm install --frozen-lockfile

      - name: Build web release candidate
        run: |
          pnpm --filter @gongzzang/web build
          mkdir -p target/supply-chain/gongzzang-web-next-build
          cp -R apps/web/.next target/supply-chain/gongzzang-web-next-build/.next
          tar -czf target/supply-chain/gongzzang-web-next-build.tgz -C target/supply-chain gongzzang-web-next-build

      - name: Build API release candidate
        run: |
          cargo build -p api --release --locked
          mkdir -p target/supply-chain/gongzzang-api-release
          cp target/release/api target/supply-chain/gongzzang-api-release/api

      - name: Generate Node workspace SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0 (Round 5 SHA pin, ADR 0028)
        with:
          path: target/supply-chain/gongzzang-web-next-build
          format: cyclonedx-json
          output-file: target/supply-chain/gongzzang-node-workspace-sbom.cdx.json

      - name: Generate Rust workspace SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0 (Round 5 SHA pin, ADR 0028)
        with:
          path: target/supply-chain/gongzzang-api-release
          format: cyclonedx-json
          output-file: target/supply-chain/gongzzang-rust-workspace-sbom.cdx.json

      - name: Attest web provenance
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb  # v4 (Round 5 SHA pin, ADR 0028)
        with:
          subject-path: target/supply-chain/gongzzang-web-next-build.tgz

      - name: Attest API provenance
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb  # v4 (Round 5 SHA pin, ADR 0028)
        with:
          subject-path: target/release/api

      - name: Attest web SBOM
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb  # v4 (Round 5 SHA pin, ADR 0028)
        with:
          subject-path: target/supply-chain/gongzzang-web-next-build.tgz
          sbom-path: target/supply-chain/gongzzang-node-workspace-sbom.cdx.json

      - name: Attest API SBOM
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb  # v4 (Round 5 SHA pin, ADR 0028)
        with:
          subject-path: target/release/api
          sbom-path: target/supply-chain/gongzzang-rust-workspace-sbom.cdx.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1 (Node 24 SHA pin, ADR 0028)
        with:
          name: supply-chain-release-candidates
          path: |
            target/supply-chain/gongzzang-web-next-build.tgz
            target/release/api
            target/supply-chain/gongzzang-node-workspace-sbom.cdx.json
            target/supply-chain/gongzzang-rust-workspace-sbom.cdx.json
          if-no-files-found: error
          retention-days: 30

  catalog-m1-boundary:
    name: Catalog M1 boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (Node 24 SHA pin, ADR 0028)
      - name: Enforce gongzzang3 catalog M1 boundary
        run: bash scripts/lefthook/catalog-m1-boundary.sh

  coverage:
    name: Coverage (tarpaulin ≥ 90%)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (Node 24 SHA pin, ADR 0028)
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (Round 5 SHA pin, ADR 0028)
        with: { toolchain: "1.91.1" }
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1 (Node 24 SHA pin, ADR 0028)
        with:
          shared-key: tarpaulin
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --version "^0.31" --locked
      - name: Run tarpaulin
        run: cargo tarpaulin --workspace --skip-clean --out Lcov --fail-under 90 --exclude-files '*/tests.rs'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1 (Node 24 SHA pin, ADR 0028)
        if: always()
        with:
          name: coverage-lcov
          path: lcov.info

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (Node 24 SHA pin, ADR 0028)
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0 (Node 24 SHA pin, ADR 0028)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (Node 24 SHA pin, ADR 0028)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8 (Node 24 SHA pin, ADR 0028)
        with: { version: 9.12.0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 (Node 24 SHA pin, ADR 0028)
        with:
          node-version: "20.19.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check internal Markdown links
        run: bash scripts/ci/check-markdown-links.sh

  file-size:
    name: File size limit (≤500 권장 / 1500 강제)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (Node 24 SHA pin, ADR 0028)
      - name: Check file sizes
        run: bash scripts/lefthook/file-line-limit.sh
