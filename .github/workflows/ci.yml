# CI — cargo + pnpm 직접 실행 (Bazel 폐기, ADR-0044 역전).
# 이전: 모든 잡이 bazelisk 경유. 현재: cargo / pnpm 표준 명령.
# 일부러 뺀 것(런칭 후 필요시 재도입): release-provenance(SBOM/SLSA 첨부), tarpaulin 90% 커버리지 게이트.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: "true"

jobs:
  rust:
    name: Rust (fmt, clippy, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (SHA pin, ADR 0028)
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (SHA pin, ADR 0028)
        with: { toolchain: "1.91.1", components: "rustfmt, clippy" }
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1 (SHA pin, ADR 0028)
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo build --release

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (SHA pin, ADR 0028)
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (SHA pin, ADR 0028)
        with: { toolchain: "1.91.1" }
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.8 --locked
      - run: cargo deny check

  frontend:
    name: Frontend (biome, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (SHA pin, ADR 0028)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8 (SHA pin, ADR 0028)
        with: { version: 9.12.0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 (SHA pin, ADR 0028)
        with:
          node-version: "20.19.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Biome check
        run: pnpm biome check .
      - name: Typecheck
        run: pnpm turbo typecheck
      - name: Unit tests
        run: pnpm turbo test
      - name: Build
        run: pnpm turbo build

  guardrails:
    name: Repo guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (SHA pin, ADR 0028)
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (SHA pin, ADR 0028)
        with: { toolchain: "1.91.1" }
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1 (SHA pin, ADR 0028)
      - name: Install ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y ripgrep
      - name: No fake pass
        run: bash scripts/lefthook/check-no-fake-pass.sh
      - name: Forbidden implementation markers
        run: bash scripts/lefthook/check-forbidden-implementation-markers.sh
      - name: Catalog M1 boundary
        run: bash scripts/lefthook/catalog-m1-boundary.sh
      - name: File size limit
        run: bash scripts/lefthook/file-line-limit.sh
      - name: Migration version prefixes (repo-guard)
        run: cargo run -p repo-guard -- migration-version-prefixes
      - name: Markdown links
        run: bash scripts/ci/check-markdown-links.sh

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (SHA pin, ADR 0028)
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0 (SHA pin, ADR 0028)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
