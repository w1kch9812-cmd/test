name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: "true"

jobs:
  lint-format:
    name: Lint & Format (Biome + clippy + markdownlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (Round 5 SHA pin, ADR 0028)
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2  # v4.1.0 (Round 5 SHA pin, ADR 0028)
        with: { version: 9.12.0 }
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0 (Round 5 SHA pin, ADR 0028)
        with:
          node-version: 20.18
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit
        run: pnpm audit --audit-level moderate
      - name: Biome check
        run: pnpm biome check .
      - name: PNU anchor PBF marker contract guardrail
        shell: pwsh
        run: ./scripts/ci/check-pnu-anchor-pbf-marker-contract.ps1
      - name: Traffic/auth policy registry guardrail
        shell: pwsh
        run: ./scripts/ci/check-traffic-auth-policy-registry.ps1
      - name: Platform Integration policy guardrail
        shell: pwsh
        run: ./scripts/ci/check-platform-integration-policy.ps1
      - name: Load-test asset guardrail
        shell: pwsh
        run: ./scripts/ci/check-load-test-assets.ps1
      - name: Production edge admission guardrail smoke
        shell: pwsh
        run: >
          ./scripts/ci/check-production-edge-admission.ps1
          -RequirePulumiAssociationPreview
          -WafRegionalResourceArn
          arn:aws:elasticloadbalancing:ap-northeast-2:123456789012:loadbalancer/app/gongzzang-ci/50dc6c495c0c9188
      - name: Platform Core boundary guardrail
        shell: pwsh
        run: ./scripts/ci/check-platform-core-boundary.ps1
      - name: Platform Core event receiver contract guardrail
        shell: pwsh
        run: ./scripts/ci/check-platform-core-event-receiver-contract.ps1
      - name: Platform Core Catalog API contract guardrail
        shell: pwsh
        run: ./scripts/ci/check-platform-core-catalog-api-contract.ps1
      - name: Platform Core dependency boundary guardrail
        shell: pwsh
        run: ./scripts/ci/check-platform-core-dependency-boundary.ps1
      - name: Pulumi local preview guardrail
        shell: pwsh
        run: ./scripts/ci/check-pulumi-local-preview.ps1
      - name: Forbidden implementation marker guardrail
        run: bash scripts/lefthook/check-forbidden-implementation-markers.sh
      - name: markdownlint
        run: pnpm markdownlint-cli2 "**/*.md" "#**/node_modules/**" "#**/_archive/**" "#**/reference/**" "#**/target/**" "#**/.next/**" "#**/.turbo/**"
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (Round 5 SHA pin, ADR 0028)
        with: { toolchain: "1.91.1", components: "rustfmt, clippy" }
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (Round 5 SHA pin, ADR 0028)
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2  # v4.1.0 (Round 5 SHA pin, ADR 0028)
        with: { version: 9.12.0 }
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0 (Round 5 SHA pin, ADR 0028)
        with:
          node-version: 20.18
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  cargo-check:
    name: cargo check + cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (Round 5 SHA pin, ADR 0028)
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (Round 5 SHA pin, ADR 0028)
        with: { toolchain: "1.91.1" }
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6  # v2.7.5 (Round 5 SHA pin, ADR 0028)
      - run: cargo check --workspace --all-features
      - uses: EmbarkStudios/cargo-deny-action@34899fc7ba81ca6268d5947a7a16b4649013fea1  # v2.0.6 (Round 5 SHA pin, ADR 0028)
        with: { command: check }

  supply-chain-provenance:
    name: Supply chain SBOM & provenance
    runs-on: ubuntu-latest
    needs: [lint-format, typecheck, cargo-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      NEXT_PUBLIC_API_BASE_URL: https://api.gongzzang.test
      NEXT_PUBLIC_NAVER_MAPS_CLIENT_ID: naver-client
      NEXT_PUBLIC_PLATFORM_CORE_BASE_URL: https://platform-core.gongzzang.test
      NEXT_PUBLIC_TILES_MANIFEST_URL: https://platform-core.gongzzang.test/catalog/v1/vector-tiles/manifest
      ZITADEL_ISSUER: https://auth.gongzzang.test
      ZITADEL_CLIENT_ID: production-ci-client
      ZITADEL_AUDIENCE: production-ci-audience
      ZITADEL_REDIRECT_URI: https://gongzzang.test/api/auth/callback
      REDIS_URL: rediss://redis.gongzzang.test:6379
      SESSION_SECRET: ci-build-session-secret-value-not-real-32-ok
      INTERNAL_AUTH_SECRET: ci-build-internal-auth-secret-value-ok
      PLATFORM_CORE_WEBHOOK_SECRET: ci-build-platform-core-webhook-secret-ok
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (Round 5 SHA pin, ADR 0028)
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2  # v4.1.0 (Round 5 SHA pin, ADR 0028)
        with: { version: 9.12.0 }
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0 (Round 5 SHA pin, ADR 0028)
        with:
          node-version: 20.18
          cache: pnpm
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (Round 5 SHA pin, ADR 0028)
        with: { toolchain: "1.91.1" }
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6  # v2.7.5 (Round 5 SHA pin, ADR 0028)
        with:
          shared-key: supply-chain-release
      - run: pnpm install --frozen-lockfile
      - name: Build web production artifact
        run: pnpm --filter @gongzzang/web build
      - name: Build API production artifact
        run: cargo build -p api --release --locked
      - name: Package web production artifact
        run: |
          mkdir -p target/supply-chain
          tar -czf target/supply-chain/gongzzang-web-next-build.tgz -C apps/web .next
      - name: Generate Node workspace SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0 (Round 5 SHA pin, ADR 0028)
        with:
          file: pnpm-lock.yaml
          format: cyclonedx-json
          output-file: target/supply-chain/gongzzang-node-workspace-sbom.cdx.json
          upload-artifact: false
      - name: Generate Rust workspace SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0 (Round 5 SHA pin, ADR 0028)
        with:
          file: Cargo.lock
          format: cyclonedx-json
          output-file: target/supply-chain/gongzzang-rust-workspace-sbom.cdx.json
          upload-artifact: false
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3 (Round 5 SHA pin, ADR 0028)
        with:
          name: supply-chain-release-candidates
          path: |
            target/supply-chain/gongzzang-web-next-build.tgz
            target/release/api
            target/supply-chain/gongzzang-node-workspace-sbom.cdx.json
            target/supply-chain/gongzzang-rust-workspace-sbom.cdx.json
      - name: Attest web artifact provenance
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb  # v4 (Round 5 SHA pin, ADR 0028)
        with:
          subject-path: target/supply-chain/gongzzang-web-next-build.tgz
      - name: Attest API artifact provenance
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb  # v4 (Round 5 SHA pin, ADR 0028)
        with:
          subject-path: target/release/api
      - name: Attest Node SBOM
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb  # v4 (Round 5 SHA pin, ADR 0028)
        with:
          subject-path: target/supply-chain/gongzzang-web-next-build.tgz
          sbom-path: target/supply-chain/gongzzang-node-workspace-sbom.cdx.json
      - name: Attest Rust SBOM
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb  # v4 (Round 5 SHA pin, ADR 0028)
        with:
          subject-path: target/release/api
          sbom-path: target/supply-chain/gongzzang-rust-workspace-sbom.cdx.json

  catalog-m1-boundary:
    name: Catalog M1 boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (Round 5 SHA pin, ADR 0028)
      - name: Enforce gongzzang3 catalog M1 boundary
        run: bash scripts/lefthook/catalog-m1-boundary.sh

  coverage:
    name: Coverage (tarpaulin ≥ 90%)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (Round 5 SHA pin, ADR 0028)
      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (Round 5 SHA pin, ADR 0028)
        with: { toolchain: "1.91.1" }
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6  # v2.7.5 (Round 5 SHA pin, ADR 0028)
        with:
          shared-key: tarpaulin
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --version "^0.31" --locked
      - name: Run tarpaulin
        run: cargo tarpaulin --workspace --skip-clean --out Lcov --fail-under 90
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3 (Round 5 SHA pin, ADR 0028)
        if: always()
        with:
          name: coverage-lcov
          path: lcov.info

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (Round 5 SHA pin, ADR 0028)
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.7 (Round 5 SHA pin, ADR 0028)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (Round 5 SHA pin, ADR 0028)
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2  # v4.1.0 (Round 5 SHA pin, ADR 0028)
        with: { version: 9.12.0 }
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0 (Round 5 SHA pin, ADR 0028)
        with:
          node-version: 20.18
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check internal Markdown links
        run: bash scripts/ci/check-markdown-links.sh

  file-size:
    name: File size limit (≤500 권장 / 1500 강제)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (Round 5 SHA pin, ADR 0028)
      - name: Check file sizes
        run: bash scripts/lefthook/file-line-limit.sh
